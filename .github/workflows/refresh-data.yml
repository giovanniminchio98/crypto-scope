name: Refresh market data

# Fetches fresh data once a day and commits it to ./data. The deployed site then
# reads those static files, so visitor traffic generates no API calls.
on:
  schedule:
    - cron: '17 6 * * *'   # daily at ~06:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data
        env:
          CG_KEY: ${{ secrets.CG_API_KEY }}   # CoinGecko demo key (server-side only)
        run: node scripts/fetch-data.mjs

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: daily refresh [skip ci]"
            git push
          fi

name: Refresh market data

# Fetches fresh data once a day and commits it to ./data. The deployed site then
# reads those static files, so visitor traffic generates no API calls.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6h at 00:00 / 06:00 / 12:00 / 18:00 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data
        env:
          # CoinGecko demo key from the COIN_GEKO_FREE_API repo secret, with an
          # inline fallback. Free-tier key (no billing attached) — worst case it
          # gets rate-limited and we rotate it. The job also runs fully keyless
          # via CryptoCompare fallbacks if the key ever stops working.
          CG_KEY: ${{ secrets.COIN_GEKO_FREE_API || 'CG-q9H92pU2KJ6DMcwnVLTuBm31' }}
        run: node scripts/fetch-data.mjs

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: daily refresh [skip ci]"
            git push
          fi
